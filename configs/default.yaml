# Training configuration
data_path: "Dataset_classes/1 Defined"
image_size: 256
batch_size: 16
epochs: 200
learning_rate: 0.001
weight_decay: 1e-4
num_workers: 4
output_dir: "outputs"
seed: 42

# Model configuration
model_channels: 64
dropout: 0.3
num_classes: 5
merge_classes: false

# Optimizer / Scheduler
scheduler_type: "cosine"  # "cosine" or "step"

# Loss configuration
loss_name: "weighted_cross_entropy" # options: "cross_entropy", "weighted_cross_entropy", "focal", "class_balanced_focal"
use_class_weights: true
class_weight_mode: "effective_num" # options: "inverse", "median_frequency", "normalized_inverse", "manual", "balanced", "effective_num"
class_weight_beta: 0.9999
focal_gamma: 2.0
focal_alpha: null
label_smoothing: 0.0
use_weighted_sampler: true
sampler_weight_mode: "effective_num"
sampler_weight_beta: 0.9999

# Inference/Validation
validate_every_n_epochs: 1
export_gradcam_on_eval: false
gradcam_target_layer: "auto" # "auto" will select the final fusion block

# Description-aligned auxiliary learning
description_aux:
  enabled: true
  clip_model_name: "openai/clip-vit-large-patch14"
  clip_max_length: 77
  clip_batch_size: 8
  clip_chunk_overlap_tokens: 16
  hidden_dim: 512
  mix_weight: 0.35
  visual_loss_weight: 0.50
  description_loss_weight: 0.35
  align_loss_weight: 0.15
  logit_scale_init: 14.2857
